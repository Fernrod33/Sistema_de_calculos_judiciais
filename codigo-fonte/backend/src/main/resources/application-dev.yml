spring:
  datasource:
    url: jdbc:h2:file:./data/calculos_judiciais;MODE=MySQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
